<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cruz Azul - Portal de Autenticación</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #0056b3; margin-bottom: 20px; }
        h3 { color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #004085; }
        .hidden { display: none; }
        .info-msg { color: #666; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Farmacias Cruz Azul</h2>
        
        <div id="step1">
            <h3>Paso 1: Acceso Corporativo</h3>
            <p class="info-msg">Ingrese sus credenciales de ingeniero para iniciar la solicitud de token.</p>
            <input type="text" id="username" placeholder="Usuario de red (admin_cruzazul)">
            <input type="password" id="password" placeholder="Contraseña de red (password123)">
            <button onclick="login()">Iniciar Sesión</button>
        </div>

        <div id="step2" class="hidden">
            <h3>Paso 2: Autenticación Multifactor</h3>
            <p class="info-msg">Se requiere un segundo factor de verificación para el acceso condicional a la plataforma web.</p>
            <input type="text" id="mfaWeb" placeholder="Código de verificación web (123456)">
            <button onclick="verificarMfaWeb()">Verificar Token</button>
        </div>
    </div>

    <script>
        // Función para enviar las credenciales del Paso 1
        async function login() {
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: usernameInput, password: passwordInput })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                // Guardamos el token temporal de paso 1 en el almacenamiento del navegador
                localStorage.setItem('token', data.token); 
                
                // Intercambiamos de vista en el portal
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                alert(data.mensaje);
            } else { 
                alert(data.error); 
            }
        }

        // Función para enviar el código MFA del Paso 2
        async function verificarMfaWeb() {
            const token = localStorage.getItem('token');
            const codigoInput = document.getElementById('mfaWeb').value;

            const res = await fetch('/api/auth/verificar-mfa-web', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ codigo: codigoInput })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                // Reemplazamos por el token con nivel de seguridad elevado (MFA 2 pasos)
                localStorage.setItem('token', data.token); 
                alert(data.mensaje);
                // Redirección inmediata al panel seguro de usuario
                window.location.href = '/portal.html';
            } else { 
                alert(data.error); 
            }
        }
    </script>
</body>
</html>
